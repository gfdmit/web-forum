name: post-service CI

on:
  push:
    paths:
      - "post-service/**"
  pull_request:
    paths:
      - "post-service/**"

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: post-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: post-service/go.mod
          cache-dependency-path: post-service/go.sum

      - name: Run unit tests
        run: go test ./internal/service/... ./internal/handler/rest/...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: post-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: post-service/go.mod
          cache-dependency-path: post-service/go.sum

      - name: Run integration tests
        run: go test -tags=integration -timeout=120s ./internal/repository/postgres/...